<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APE REACTION // W.E.E.D. PROTOCOL</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #terminal {
            width: 100%;
            max-width: 900px;
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .system-broadcast {
            color: #ff8800;
            margin-bottom: 10px;
        }

        .intro-text {
            color: #00ff41;
            margin-bottom: 20px;
        }

        #input-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            border-top: 1px solid #222;
            padding-top: 20px;
            padding-bottom: 10px;
        }

        input {
            flex-grow: 1;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #00ff41;
            padding: 15px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
        }

        input:focus { border-color: #00ff41; }

        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 0 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Improved Legal Text Legibility */
        .legal-footer {
            width: 100%;
            max-width: 900px;
            font-size: 0.85rem;
            color: #888; 
            margin-top: 20px;
            border-top: 1px solid #222;
            padding-top: 15px;
            line-height: 1.5;
        }

        /* Tucked away system versioning */
        .version-tag {
            font-size: 0.7rem;
            color: #333;
            margin-top: auto;
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        .architect-response {
            color: #ffffff;
            margin-top: 15px;
            padding-left: 10px;
            border-left: 2px solid #00ff41;
        }

        /* Scrollbar styling for that terminal look */
        #terminal::-webkit-scrollbar { width: 5px; }
        #terminal::-webkit-scrollbar-thumb { background: #222; }
