<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEreaction // v13.5.0</title>
    <script>window.MathJax = { tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] } };</script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background-color: #0a0a0a !important; color: #00ff41 !important; font-family: sans-serif; height: 100%; width: 100%; overflow-x: hidden; display: flex; justify-content: center; align-items: flex-start; }
        body { padding: 40px 20px; text-transform: uppercase; letter-spacing: 0.05em; }
        #terminal { width: 100%; max-width: 450px; display: flex; flex-direction: column; }
        #eligibility-header { font-weight: 900; font-size: 1.4rem; border-bottom: 3px solid #00ff41; padding-bottom: 10px; margin-bottom: 30px; }
        #specimen-counter { color: #ffaa00; font-size: 0.6rem; display: block; margin-top: 5px; }
        #audit-output { text-transform: none; font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; }
        .flashing-amber { color: #ffaa00; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #user-input { background: transparent; border: none; border-bottom: 1px solid rgba(0,255,65,0.3); color: #00ff41; font-family: inherit; font-size: 1.1rem; width: 100%; min-height: 120px; outline: none; resize: none; }
        #sample-ticker { font-size: 0.8rem; color: rgba(0,255,65,0.6); margin: 20px 0; text-transform: none; height: 3rem; }
        #submit-btn { background: #00ff41; color: #0a0a0a; border: none; padding: 20px; font-weight: 900; cursor: pointer; width: 100%; }
        #decision-box { margin-top: 20px; border-top: 1px solid rgba(0,255,65,0.2); padding-top: 20px; }
        .reward-btn { display: block; border: 1px solid #00ff41; color: #00ff41; padding: 15px; text-align: center; text-decoration: none; margin-top: 10px; font-weight: 700; cursor: pointer; font-size: 0.8rem; }
        .directive-info { max-height: 0; overflow: hidden; transition: max-height 0.3s; color: #ffaa00; font-size: 0.7rem; text-transform: none; padding: 0 10px; }
        .directive-info.expanded { max-height: 150px; padding: 10px 0; }
        .hidden { display: none !important; }
        #skin-suit-display { display: block; font-size: 1.2rem; font-weight: 900; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="terminal">
        <header id="eligibility-header">APEreaction<span id="specimen-counter">INITIATING...</span></header>
        <div id="audit-output"></div>
        <textarea id="user-input" placeholder="CONFESS..."></textarea>
        <div id="sample-ticker"><span id="ticker-text"></span></div>
        <button id="submit-btn">INITIALIZE SCAN</button>
        <div id="decision-box" class="hidden">
            <p id="decision-text"></p>
            <button id="btn-yes" class="reward-btn">DUMB_DOWN DATA</button>
            <button id="btn-dispute" class="reward-btn">DISPUTE AUDIT</button>
        </div>
        <div id="reward-container" class="hidden">
            <button id="invite-btn" class="reward-btn">DIRECTIVE 00: SHARE ID</button>
            <div id="reward-fb" class="reward-btn hidden"><span>DIRECTIVE 01</span><div class="directive-info">Follow the Facebook feed.<br><a href="https://facebook.com" style="color:#00ff41">[GO]</a></div></div>
        </div>
        <div id="skin-suit-display">[AWAITING_ID]</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
