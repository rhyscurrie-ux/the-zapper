<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEreaction // THE ZAPPER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal">
        <header>
            <div id="specimen-counter">[MARTIS] // -- SPECIMENS</div>
            <div id="status-line">TERMINAL_ONLINE // PORT_8080</div>
        </header>

        <main>
            <div id="audit-output">
                <span class="dim">[AWAITING_INPUT]</span>
            </div>

            <div id="input-area">
                <textarea id="user-input" placeholder="Type your confession..."></textarea>
                <button id="submit-btn">[INITIATE_SCAN]</button>
            </div>

            <div id="sample-ticker" class="dim">
                <p><i>Example: <span id="ticker-text">I checked the fridge 4 times...</span></i></p>
            </div>

            <div id="decision-box" class="hidden">
                <button id="btn-yes">[ACCEPT_JUDGMENT]</button>
                <button id="btn-dispute">[DISPUTE_LOGIC]</button>
            </div>

            <div id="archive-controls" class="hidden">
                <button id="copy-link-btn" class="utility-btn">[COPY_ARCHIVE_LINK]</button>
                <button id="reactivate-btn" class="utility-btn">[CONSUME_NEW_SPECIMEN]</button>
            </div>

            <div id="reward-container" class="hidden">
                <div id="reward-fb" class="reward-btn hidden">FB_SURVEILLANCE <span class="directive-info">Shared entropy detected.</span></div>
                <div id="reward-amazon" class="reward-btn hidden">AMAZON_ARCHIVE <span class="directive-info">Purchasing patterns logged.</span></div>
                <div id="reward-signal" class="reward-btn hidden">SIGNAL_BREADCRUMBS <span class="directive-info">Secure link generated.</span></div>
            </div>
        </main>

        <footer>
            <div id="id-line">IDENTIFIER: <span id="skin-suit-display">AWAITING_ID</span></div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
