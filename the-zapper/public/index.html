<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEreaction // THE ZAPPER</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal">
        <header id="eligibility-header">
            APEreaction // PROXIMITY_AUDIT<br>
            <span>WEED_ELIGIBILITY_SCAN</span>
        </header>

        <main id="vortex">
            <div id="audit-output">
                <span class="dim">[AWAITING_INPUT]</span>
            </div>

            <div id="input-section">
                <textarea id="user-input" placeholder="Confess your stagnation to the Architect..."></textarea>
                
                <div id="sample-ticker">
                    <span id="ticker-label">Example:</span>
                    <span id="ticker-text">"I checked the fridge 4 times in 10 minutes hoping for new content."</span>
                </div>
                
                <button id="submit-btn">INITIALIZE SCAN</button>
            </div>

            <div id="decision-box" class="hidden">
                <p id="decision-text">DOES SPECIMEN REQUIRE CLARIFICATION?</p>
                <div class="decision-buttons">
                    <button id="btn-yes" class="reward-btn">YES, DUMB_DOWN THE DATA</button>
                    <button id="btn-dispute" class="reward-btn">DISPUTE AUDIT LOG</button>
                </div>
                
                <div id="directive-container" class="hidden">
                    <a id="directive-link" href="#" target="_blank" class="reward-btn flashing-amber" style="margin-top:20px; border-color:#ffaa00;">
                        [DIRECTIVE_RECEIVED: CLICK TO INITIALIZE]
                    </a>
                </div>
            </div>
        </main>

        <footer id="legal-footer">
            THE ARCHITECT MIGHT REPRODUCE YOUR RESPONSES.<br>
            <span id="skin-suit-display">[AWAITING_IDENTIFIER]</span>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
