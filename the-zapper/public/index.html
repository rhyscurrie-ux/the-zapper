        #user-input {

        .reward-btn { display: block; border: 1px solid #00ff41; color: #00ff41; text-decoration: none; padding: 15px; text-align: center; font-size: 0.8rem; cursor: pointer; background: transparent; font-family: inherit; text-transform: uppercase; font-weight: 700; }
