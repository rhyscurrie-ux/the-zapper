<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Burner Terminal [v11.5.0]</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; box-sizing: border-box; }
        #output { border: 1px solid #003300; padding: 20px; height: 70vh; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; }
        .input-area { display: flex; gap: 10px; margin-top: 20px; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="output">[ARCHITECT: AWAITING_SUBSTRATE...]</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Signal intake..." onkeydown="if(event.key==='Enter') scan()">
        <button onclick="scan()">SCAN</button>
    </div>

    <script>
        async function scan() {
            const input = document.getElementById('userInput');
            const output = document.getElementById('output');
            const data = input.value;
            if(!data) return;

            input.value = '';
            output.innerHTML += `\n\n> Specimen_Input: "${data}"\n[PROCESSING...]`;
            
            try {
                const res = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: data })
                });
                const result = await res.json();
                output.innerHTML += `\n${result.audit}`;
                output.scrollTop = output.scrollHeight;
            } catch (err) {
                output.innerHTML += `\n[CRITICAL_ERROR]: ${err.message}`;
            }
        }
    </script>
</body>
</html>
