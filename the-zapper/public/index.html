<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEreaction // THE ZAPPER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal-container">
        <header>
            <div id="specimen-counter">[MARTIS] // -- SPECIMENS</div>
            <div id="status-line">TERMINAL_ONLINE // PORT_8080</div>
        </header>

        <div id="output-pane">
            <div id="audit-output"><span class="dim">[AWAITING_INPUT]</span></div>
        </div>

        <div id="input-pane">
            <textarea id="user-input" placeholder="Enter confession..."></textarea>
            <div id="controls">
                <button id="submit-btn">[INITIATE_SCAN]</button>
            </div>
            <div id="sample-ticker" class="dim">
                <i>Example: <span id="ticker-text">I checked the fridge 4 times...</span></i>
            </div>
        </div>

        <div id="decision-box" class="hidden">
            <button id="btn-dispute">[DISPUTE_LOGIC]</button>
            <button id="reactivate-btn" class="utility-btn">[NEW_SPECIMEN]</button>
            <button id="copy-link-btn" class="utility-btn">[COPY_LINK]</button>
        </div>

        <footer>
            IDENTIFIER: <span id="skin-suit-display">AWAITING_ID</span>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
